<!DOCTYPE html>                                                                         <!-- Объявление типа документа (HTML5) -->
<html lang="ru">                                                                        <!-- Корневой элемент с указанием языка  -->
    <head>                                                                              <!-- Контейнер для метаданных -->
        <meta charset="UTF-8" />                                                        <!-- Кодировка символов UTF-8 -->
        <meta name="viwport" content="width=device-width, intial-scale=1.0" />          <!-- Настройка viewport для мобильных устройств (опечатка в "viewport" и "initial") -->
        <title> JSON и DOM</title>                                                      <!-- Заголовок вкладки браузера -->
        <!-- Начало стилей CSS -->
        <style>
            /* Стили для тега body */
            body {
                font-family: Arial, sans-serif;         /* Шрифт Arial или любой без засечек */
                padding: 20px;                          /* Внутренний отступ 20px со всех сторон */
                max-width: 1000px;                      /* Максимальная ширина контента 1000px */
                margin: auto;                           /* Автоматические отступы по бокам (центрирование) */
            }
            /* Стили для таблицы */
            table {
                width: 100%;                            /* Ширина 100% от родителя */
                border-collapse: collapse;              /* Убирает двойные границы между ячейками */
                margin-top: 10px;                       /* Внешний отступ сверху 10px */
            }
            /* Стили для заголовков */
            th, td {
                border: 1px solid #ccc;                /* Серая рамка толщиной 1px */
                padding: 6px;                            /* Внутренний отступ 6px */
                text-align: left;                        /* Выравнивание текста по левому краю */
            }
            /* Дополнительные стили для заголовков */
            th {
                background: #f3f3f3;                    /* Фон */
            }
            /* Стили для всех кнопок */
            button {
                cursor: pointer;                          /* Курсор в виде руки при наведении */
            }
            /* Стиль для блока с кнопками и поиском */
            .controls {
                margin-bottom: 10px;                      /* Отступ снизу 10px */
                display: flex;                            /* Гибкий контейнер (flexbox) */
                gap: 10px;                                /* Расстояние между элементами 10px */
                flex-wrap: wrap;                          /* Перенос элементов при нехватке места */
            }
            /* Стили для формы */
            form {
                margin-top: 20px;                          /* Отступ сверху 20px */
                display: grid;                             /* Сеточная верстка (grid) */
                grid-template-columns: repeat(2, 1fr);     /* Две колонки равной ширины */
                gap: 10px;                                 /* Расстояние между ячейками сетки 10px */
            }
            /* Стили для кнопки внутри формы */
            form button {
                grid-column: span 2;                        /* Кнопка занимает обе колонки */
            }
        </style>                                                                     <!-- Конец стилей CSS --> 
    </head>                                                                          <!-- Закрытие head -->
    <body>                                                                           <!-- Начало видимой части страницы -->

        <h1>JSON и DOM</h1>                                                          <!-- Заголовок первого уровня -->

        <div class="controls">                                                       <!-- Контейнер для элементов управления -->
            <button id="reload">Загрузить JSON</button>                              <!-- Кнопка загрузки данных -->
            <button id="export">Скачать JSON</button>                                <!-- Кнопка экспорта в JSON -->
            <input id="search" placeholder="Поиск по названию или автору" />         <!-- Поле поиска -->
        </div>

        <table>                          <!-- Начало таблицы -->
            <thead>                       <!-- Заголовочная часть таблицы -->
                <tr>                        <!-- Строка заголовков -->
                    <th>Название</th>        <!-- Заголовок колонки "Название" -->
                    <th>Автор</th>           <!-- Заголовок колонки "Автор" -->
                    <th>Жанр</th>            <!-- Заголовок колонки "Жанр" -->
                    <th>Год</th>             <!-- Заголовок колонки "Год" -->
                    <th>Рейтинг</th>         <!-- Заголовок колонки "Рейтинг" -->
                    <th>Действия</th>        <!-- Заголовок колонки "Действия" -->
                </tr>                       <!-- Закрытие строки заголовков -->
            </thead>                      <!-- Закрытие заголовочной части -->
            <tbody id="table-body"></tbody> <!-- Тело таблицы (будет заполняться JS) -->
        </table>                         <!-- Конец таблицы -->

        <h2>Добавить/редактироать книгу</h2> <!-- Подзаголовок (опечатка: "редактироать") -->

        <form id="book-form">             <!-- Форма для добавления/редактирования -->
            <input type="hidden" name="id" /> <!-- Скрытое поле для хранения id книги -->
            <input name="title" placeholder="Название" required /> <!-- Поле названия (обязательное) -->
            <input name="author" placeholder="Автор" required /> <!-- Поле автора (обязательное) -->
            <input name="genre" placeholder="Жанр" /> <!-- Поле жанра -->
            <input name="year" type="number" placeholder="Год" /> <!-- Поле года (числовое) -->
            <input name="rating" type="number" step="0.1" placeholder="Рейтинг" /> <!-- Поле рейтинга (число с шагом 0.1) -->
            <button type="submit">Сохранить</button> <!-- Кнопка отправки формы -->
        </form>                          <!-- Конец формы -->

        <script type="module" scr="app.js"></script> <!-- Подключение JS-модуля (опечатка: scr вместо src) -->
    </body>                              <!-- Конец body -->
</html>                                 <!-- Конец HTML-документа -->
